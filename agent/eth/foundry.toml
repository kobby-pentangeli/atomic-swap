[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["dependencies"]
optimizer = true
optimizer_runs = 200
solc = "0.8.28"
evm_version = "cancun"
ffi = false
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read", path = "./out" }]

[lint]
# The HTLC timing windows (24h commitment, 1min reveal floor) are coarse by
# design; a validator's ~15s timestamp leeway cannot affect them.
exclude_lints = ["block-timestamp"]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 256
depth = 32
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[soldeer]
remappings_generate = false

[dependencies]
"@openzeppelin-contracts" = "5.4.0"
forge-std = "1.9.4"
