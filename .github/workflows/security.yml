name: Security Audit

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  push:
    branches: [master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `licenses` is omitted until its allow-list is validated locally
      # (see deny.toml). advisories/bans/sources are deterministic gates.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
