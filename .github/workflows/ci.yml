name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/eth/package-lock.json

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            agent/eth/artifacts
            agent/eth/cache
          key: hardhat-${{ hashFiles('agent/eth/contracts/**/*.sol') }}

      - name: Generate contract artifacts
        run: |
          cd agent/eth
          npm ci
          npx hardhat compile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check --all-targets --all-features

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/eth/package-lock.json

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            agent/eth/artifacts
            agent/eth/cache
          key: hardhat-${{ hashFiles('agent/eth/contracts/**/*.sol') }}

      - name: Generate contract artifacts
        run: |
          cd agent/eth
          npm ci
          npx hardhat compile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        run: cargo test --all-features

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/eth/package-lock.json

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            agent/eth/artifacts
            agent/eth/cache
          key: hardhat-${{ hashFiles('agent/eth/contracts/**/*.sol') }}

      - name: Generate contract artifacts
        run: |
          cd agent/eth
          npm ci
          npx hardhat compile

      - name: Install Rust nightly with clippy
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: cargo clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  fmt:
    name: rustfmt (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: rustfmt check
        run: cargo fmt -- --check

  docs:
    name: cargo doc (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/eth/package-lock.json

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            agent/eth/artifacts
            agent/eth/cache
          key: hardhat-${{ hashFiles('agent/eth/contracts/**/*.sol') }}

      - name: Generate contract artifacts
        run: |
          cd agent/eth
          npm ci
          npx hardhat compile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo doc
        run: cargo doc --no-deps --all-features
